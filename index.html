<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OlegTube — Лента</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #d0e2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        
        /* ========== АВТОРИЗАЦИЯ ========== */
        .auth-container {
            max-width: 400px;
            width: 100%;
            background: #eef4fc;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 8px 20px rgba(0,0,0,0.1);
            border-top: 3px solid #3b6e9e;
        }
        .auth-container h2 { text-align: center; color: #1f4462; margin-bottom: 24px; }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 1px solid #b0c9e2;
            border-radius: 30px;
            font-size: 1rem;
            background: white;
        }
        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #3b6e9e;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .auth-btn:hover { background: #2c5a7c; }
        .switch-btn { background: none; color: #3b6e9e; border: 1px solid #3b6e9e; }
        .error-msg { color: #e74c3c; text-align: center; margin-bottom: 12px; }
        
        /* ========== ОСНОВНОЕ ПРИЛОЖЕНИЕ ========== */
        .app-container {
            max-width: 580px;
            width: 100%;
            background: #eef4fc;
            border-radius: 12px;
            overflow: hidden;
            height: 85vh;
            display: flex;
            flex-direction: column;
            border-top: 3px solid #3b6e9e;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.05), 0 8px 20px rgba(0,0,0,0.1);
        }
        .app-header {
            background: #3b6e9e;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .app-header h1 { font-size: 1.9rem; color: white; }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .feed-area { flex: 1; overflow-y: auto; padding: 16px; position: relative; }
        
        /* ========== ПОСТЫ ========== */
        .post-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #bdd4e8;
        }
        .avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #2c6e9e, #1f4e73);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .post-author { display: flex; gap: 12px; align-items: center; }
        .author-info { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .author-name { font-weight: bold; color: #0f2e4a; }
        .verified-badge { color: #3b6e9e; font-size: 0.9rem; }
        .post-date { font-size: 0.7rem; color: #6c8eae; margin-top: 2px; }
        .post-text { margin-top: 12px; color: #1a2c3e; word-break: break-word; }
        .post-actions { margin-top: 14px; display: flex; gap: 24px; color: #5b7f9e; cursor: pointer; }
        .empty-feed { text-align: center; padding: 48px; color: #6c8eae; }
        
        /* ========== НАВИГАЦИЯ ========== */
        .bottom-nav {
            background: #2c5a7c;
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
        }
        .nav-item {
            background: none;
            border: none;
            color: #d4e6fc;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 4px; }
        .nav-item.active { background: #1f4a6e; color: #ffdd99; }
        .create-btn-nav { background: #f4b642; color: #2c3e2b; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
        .hide { display: none; }
        
        /* ========== МОДАЛКА ПОСТА ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            z-index: 1000;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 85%;
            max-width: 400px;
        }
        .modal-card textarea {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #bdd4e8;
            margin: 16px 0;
            font-family: inherit;
            resize: vertical;
        }
        .modal-actions button {
            padding: 8px 20px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
        }
        .modal-actions button.primary { background: #3b6e9e; color: white; }
        
        /* ========== СПИСОК ЧАТОВ (СОВРЕМЕННЫЙ ВИД) ========== */
        .chats-main-container {
            background: transparent;
            border-radius: 12px;
        }
        .new-chat-btn {
            background: #3b6e9e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 30px;
            margin-bottom: 16px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }
        .chat-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid #bdd4e8;
            transition: 0.1s;
        }
        .chat-item:hover { background: #f0f4f9; }
        .chat-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #2c6e9e, #1f4e73);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; color: #1f4462; }
        .chat-last-msg { font-size: 0.75rem; color: #6c8eae; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .chat-time { font-size: 0.7rem; color: #6c8eae; }
        
        /* ========== ОКНО ЧАТА (СТИЛЬ ИЗ ВТОРОГО КОДА) ========== */
        .chat-window-modern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #eef4fc;
            display: flex;
            flex-direction: column;
            z-index: 20;
            border-radius: 12px;
            overflow: hidden;
        }
        .chat-header-modern {
            background: #2c5a7c;
            color: white;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header-modern .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-header-modern .back-btn:hover { background: rgba(255,255,255,0.2); }
        .chat-header-modern .chat-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .chat-header-modern .chat-name { flex: 1; font-size: 1.1rem; font-weight: 500; }
        .messages-list-modern {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.9rem;
            word-break: break-word;
        }
        .msg-out {
            align-self: flex-end;
            background: #3b6e9e;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg-in {
            align-self: flex-start;
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            border: 1px solid #bdd4e8;
        }
        .msg-meta {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            margin-top: 4px;
            opacity: 0.7;
        }
        .chat-input-modern {
            padding: 12px;
            background: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #bdd4e8;
        }
        .chat-input-modern input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 25px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 0.9rem;
        }
        .chat-input-modern button {
            background: #3b6e9e;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1rem;
        }
        .chat-input-modern button:hover { background: #2c5a7c; }
        
        /* поиск пользователей */
        .user-list-modern {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-bottom: 1px solid #bdd4e8;
            cursor: pointer;
            transition: background 0.1s;
        }
        .user-item:hover { background: #f0f4f9; }
        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #2c6e9e, #1f4e73);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .search-input {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #b0c9e2;
            margin-bottom: 16px;
        }
        .profile-card { text-align: center; padding: 24px; }
        .big-avatar {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, #2c6e9e, #1f4e73);
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
        }
        .info-message {
            background: #fff1cf;
            padding: 16px;
            border-radius: 16px;
            margin-top: 20px;
        }
        .search-result-item {
            background: white;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 8px;
            border-left: 4px solid #3b6e9e;
        }
    </style>
</head>
<body>

<!-- ЭКРАН АВТОРИЗАЦИИ -->
<div id="authScreen" class="auth-container">
    <h2><i class="fas fa-film"></i> OlegTube</h2>
    <div id="authError" class="error-msg"></div>
    <input type="text" id="loginName" class="auth-input" placeholder="👤 Имя пользователя">
    <input type="password" id="loginPassword" class="auth-input" placeholder="🔒 Пароль">
    <button id="loginBtn" class="auth-btn">Войти</button>
    <button id="showRegisterBtn" class="auth-btn switch-btn">Зарегистрироваться</button>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div id="appScreen" class="app-container" style="display: none;">
    <div class="app-header">
        <h1>OlegTube</h1>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
    </div>

    <div class="feed-area" id="mainContentArea" style="position: relative;">
        <!-- Лента постов -->
        <div id="feedPanel">
            <div id="postsContainer"></div>
        </div>
        
        <!-- Поиск -->
        <div id="searchPanel" class="hide">
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск постов...">
            <div id="searchResultsContainer"></div>
        </div>
        
        <!-- Сообщения (современный вид чатов) -->
        <div id="messagesPanel" class="hide">
            <div id="chatsMainContainer">
                <button id="startNewChatMainBtn" class="new-chat-btn"><i class="fas fa-plus-circle"></i> Новый диалог</button>
                <div id="chatsListModern"></div>
            </div>
            <div id="newChatSelection" style="display: none;">
                <button id="backToChatListBtn" class="new-chat-btn" style="background:#6c8eae;"><i class="fas fa-arrow-left"></i> Назад</button>
                <input type="text" id="searchUsersInput" class="search-input" placeholder="🔍 Поиск пользователей...">
                <div id="allUsersList"></div>
            </div>
            <!-- контейнер для чата будет добавлен динамически -->
        </div>
        
        <!-- Профиль -->
        <div id="profilePanel" class="hide">
            <div class="profile-card">
                <div class="big-avatar" id="profileAvatar"></div>
                <h2 id="profileName"></h2>
                <div class="info-message">
                    📝 Постов: <span id="userPostCount">0</span><br>
                    🔐 Статус: <span id="userVerifiedStatus"></span>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" id="navHome"><i class="fas fa-home"></i><span>Главная</span></button>
        <button class="nav-item" id="navSearch"><i class="fas fa-search"></i><span>Поиск</span></button>
        <button class="nav-item" id="navMessages"><i class="fas fa-envelope"></i><span>Сообщения</span></button>
        <button class="nav-item create-btn-nav" id="navCreatePost"><i class="fas fa-plus-circle"></i><span>Создать</span></button>
        <button class="nav-item" id="navProfile"><i class="fas fa-user-alt"></i><span>Профиль</span></button>
    </div>
</div>

<!-- МОДАЛКА ПОСТА -->
<div id="createModal" class="modal-overlay">
    <div class="modal-card">
        <h3>Новый пост</h3>
        <textarea id="postTextInput" rows="3" placeholder="Что нового?"></textarea>
        <div class="modal-actions">
            <button id="cancelModalBtn">Отмена</button>
            <button id="confirmPostBtn" class="primary">Опубликовать</button>
        </div>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { 
        getFirestore, collection, addDoc, getDocs, getDoc,
        query, orderBy, where, doc, updateDoc, 
        arrayUnion, arrayRemove, setDoc, onSnapshot, limit, serverTimestamp
    } from "firebase/firestore";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDuJfaJAvigdDsCkeLoHpM3QG30YANa5tU",
        authDomain: "olegtub-69d16.firebaseapp.com",
        projectId: "olegtub-69d16",
        storageBucket: "olegtub-69d16.firebasestorage.app",
        messagingSenderId: "899139233363",
        appId: "1:899139233363:web:d18229151ec65c5cd4c8a6"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let currentUser = null;
    let currentPanel = 'home';
    let allPosts = [];
    let unsubscribeRealtime = null;
    let chatsUnsubscribe = null;
    let currentChatId = null;
    let currentChatPartner = null;
    let messagesUnsubscribe = null;
    
    // ========== ВСПОМОГАТЕЛЬНЫЕ ==========
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function formatDate(date) {
        if (!date) return "только что";
        const diff = Math.floor((new Date() - date) / 60000);
        if (diff < 1) return "только что";
        if (diff < 60) return `${diff} мин назад`;
        if (diff < 1440) return `${Math.floor(diff / 60)} ч назад`;
        return `${Math.floor(diff / 1440)} дн назад`;
    }
    
    // ========== ПОЛЬЗОВАТЕЛИ ==========
    async function getUserVerifiedStatus(username) {
        const userRef = doc(db, "users", username);
        const snap = await getDoc(userRef);
        return snap.exists() ? snap.data().isVerified === true : false;
    }
    
    async function getAllUsers() {
        const snapshot = await getDocs(collection(db, "users"));
        return snapshot.docs.map(doc => ({ username: doc.id, ...doc.data() }));
    }
    
    async function registerUser(username, password) {
        if (!username || !password) throw new Error("Заполните поля");
        if (password.length < 4) throw new Error("Пароль минимум 4 символа");
        if (username.length < 3) throw new Error("Имя минимум 3 символа");
        const userRef = doc(db, "users", username);
        const userSnap = await getDoc(userRef);
        if (userSnap.exists()) throw new Error("Пользователь уже существует");
        await setDoc(userRef, { username, password, createdAt: new Date().toISOString(), isVerified: false });
        return { username };
    }
    
    async function loginUser(username, password) {
        const userRef = doc(db, "users", username);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) throw new Error("Пользователь не найден");
        if (userSnap.data().password !== password) throw new Error("Неверный пароль");
        return { username };
    }
    
    // ========== ПОСТЫ ==========
    async function getAllPosts() {
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        const snapshot = await getDocs(q);
        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), timestamp: doc.data().timestamp?.toDate() || new Date() }));
    }
    
    async function addPost(text) {
        if (!currentUser) throw new Error("Не авторизован");
        if (!text.trim()) throw new Error("Пустой пост");
        const isVerified = await getUserVerifiedStatus(currentUser.username);
        await addDoc(collection(db, "posts"), {
            author: currentUser.username, text: text.trim(), timestamp: new Date(),
            userId: currentUser.username, likes: [], likesCount: 0, authorVerified: isVerified
        });
    }
    
    async function toggleLike(postId) {
        if (!currentUser) return;
        const postRef = doc(db, "posts", postId);
        const postSnap = await getDoc(postRef);
        if (!postSnap.exists()) return;
        const data = postSnap.data();
        const hasLiked = data.likes?.includes(currentUser.username);
        if (hasLiked) {
            await updateDoc(postRef, { likes: arrayRemove(currentUser.username), likesCount: data.likesCount - 1 });
        } else {
            await updateDoc(postRef, { likes: arrayUnion(currentUser.username), likesCount: (data.likesCount || 0) + 1 });
        }
    }
    
    async function getUserPostCount() {
        if (!currentUser) return 0;
        const q = query(collection(db, "posts"), where("userId", "==", currentUser.username));
        const snapshot = await getDocs(q);
        return snapshot.size;
    }
    
    async function renderFeed() {
        const container = document.getElementById('postsContainer');
        if (!container) return;
        if (allPosts.length === 0) { container.innerHTML = '<div class="empty-feed">📭 Нет постов. Создайте первый!</div>'; return; }
        container.innerHTML = allPosts.map(post => {
            const hasLiked = post.likes?.includes(currentUser?.username);
            const verifiedBadge = post.authorVerified ? '<i class="fas fa-check-circle verified-badge"></i>' : '';
            return `
                <div class="post-card">
                    <div class="post-author">
                        <div class="avatar">${escapeHtml(post.author.charAt(0).toUpperCase())}</div>
                        <div>
                            <div class="author-info"><span class="author-name">${escapeHtml(post.author)}</span>${verifiedBadge}</div>
                            <div class="post-date">${formatDate(post.timestamp)}</div>
                        </div>
                    </div>
                    <div class="post-text">${escapeHtml(post.text)}</div>
                    <div class="post-actions"><span class="like-btn" data-id="${post.id}"><i class="${hasLiked ? 'fas fa-heart' : 'far fa-heart'}" style="${hasLiked ? 'color:#e74c3c' : ''}"></i> <span>${post.likesCount || 0}</span></span></div>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.like-btn').forEach(btn => { btn.onclick = async () => { await toggleLike(btn.dataset.id); await loadPosts(); }; });
    }
    
    async function loadPosts() {
        allPosts = await getAllPosts();
        if (currentPanel === 'home') await renderFeed();
        if (currentPanel === 'profile') await updateProfile();
    }
    
    function setupRealtime() {
        if (unsubscribeRealtime) unsubscribeRealtime();
        const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));
        unsubscribeRealtime = onSnapshot(q, async (snapshot) => {
            allPosts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data(), timestamp: doc.data().timestamp?.toDate() || new Date() }));
            if (currentPanel === 'home') await renderFeed();
            if (currentPanel === 'search') { const input = document.getElementById('searchInput'); if (input?.value) await performSearch(input.value); }
        });
    }
    
    async function performSearch(query) {
        const container = document.getElementById('searchResultsContainer');
        if (!query.trim()) { container.innerHTML = '<div class="empty-feed">🔍 Введите текст</div>'; return; }
        const results = allPosts.filter(p => p.author.toLowerCase().includes(query.toLowerCase()) || p.text.toLowerCase().includes(query.toLowerCase()));
        if (!results.length) { container.innerHTML = '<div class="empty-feed">😢 Ничего не найдено</div>'; return; }
        container.innerHTML = results.map(post => `<div class="search-result-item"><strong>${escapeHtml(post.author)}</strong> ${post.authorVerified ? '<i class="fas fa-check-circle" style="color:#3b6e9e;"></i>' : ''}<br>${escapeHtml(post.text.substring(0, 100))}</div>`).join('');
    }
    
    async function updateProfile() {
        if (!currentUser) return;
        const isVerified = await getUserVerifiedStatus(currentUser.username);
        document.getElementById('profileName').innerText = currentUser.username;
        document.getElementById('profileAvatar').innerText = currentUser.username.charAt(0).toUpperCase();
        document.getElementById('userPostCount').innerText = await getUserPostCount();
        document.getElementById('userVerifiedStatus').innerText = isVerified ? "✅ Верифицирован" : "❌ Не верифицирован";
    }
    
    // ========== ЛИЧНЫЕ СООБЩЕНИЯ (СОВРЕМЕННЫЙ ИНТЕРФЕЙС) ==========
    async function getOrCreateChatId(otherUsername) {
        const chatId = [currentUser.username, otherUsername].sort().join('_');
        const chatRef = doc(db, "chats", chatId);
        const chatSnap = await getDoc(chatRef);
        if (!chatSnap.exists()) {
            await setDoc(chatRef, { participants: [currentUser.username, otherUsername], lastMessage: "", lastMessageTime: new Date(), type: "private" });
        }
        return chatId;
    }
    
    async function sendMessageToChat(chatId, text) {
        if (!text.trim()) return;
        await addDoc(collection(db, "chats", chatId, "messages"), {
            text: text.trim(), senderId: currentUser.username, timestamp: serverTimestamp(), read: false
        });
        await updateDoc(doc(db, "chats", chatId), { lastMessage: text.trim(), lastMessageTime: new Date() });
    }
    
    function subscribeToChatsList(callback) {
        const q = query(collection(db, "chats"), where("participants", "array-contains", currentUser.username));
        return onSnapshot(q, async (snapshot) => {
            const chats = [];
            for (const docSnap of snapshot.docs) {
                const chat = { id: docSnap.id, ...docSnap.data() };
                const other = chat.participants.find(p => p !== currentUser.username);
                chat.otherUserName = other;
                chats.push(chat);
            }
            chats.sort((a,b) => (b.lastMessageTime?.toDate() || 0) - (a.lastMessageTime?.toDate() || 0));
            callback(chats);
        });
    }
    
    function renderChatsListModern() {
        const container = document.getElementById('chatsListModern');
        if (!container) return;
        if (chatsUnsubscribe) chatsUnsubscribe();
        chatsUnsubscribe = subscribeToChatsList(async (chats) => {
            if (chats.length === 0) {
                container.innerHTML = `<div class="empty-feed" style="padding:40px;"><i class="fas fa-comments" style="font-size:3rem;"></i><p>Нет чатов</p></div>`;
                return;
            }
            container.innerHTML = chats.map(chat => `
                <div class="chat-item" data-chat-id="${chat.id}" data-user="${chat.otherUserName}">
                    <div class="chat-avatar">${escapeHtml(chat.otherUserName.charAt(0).toUpperCase())}</div>
                    <div class="chat-info">
                        <div class="chat-name">${escapeHtml(chat.otherUserName)}</div>
                        <div class="chat-last-msg">${escapeHtml(chat.lastMessage?.substring(0, 50) || 'Новый чат')}</div>
                    </div>
                    <div class="chat-time">${formatDate(chat.lastMessageTime?.toDate())}</div>
                </div>
            `).join('');
            document.querySelectorAll('.chat-item').forEach(el => {
                el.onclick = () => openModernChat(el.dataset.chatId, el.dataset.user);
            });
        });
    }
    
    function openModernChat(chatId, partnerName) {
        if (messagesUnsubscribe) messagesUnsubscribe();
        currentChatId = chatId;
        currentChatPartner = partnerName;
        const panel = document.getElementById('messagesPanel');
        const existingWindow = document.getElementById('modernChatWindow');
        if (existingWindow) existingWindow.remove();
        
        const chatWindowDiv = document.createElement('div');
        chatWindowDiv.id = 'modernChatWindow';
        chatWindowDiv.className = 'chat-window-modern';
        chatWindowDiv.innerHTML = `
            <div class="chat-header-modern">
                <button class="back-btn" id="closeModernChat"><i class="fas fa-arrow-left"></i></button>
                <div class="chat-avatar">${escapeHtml(partnerName.charAt(0).toUpperCase())}</div>
                <div class="chat-name">${escapeHtml(partnerName)}</div>
            </div>
            <div class="messages-list-modern" id="modernMessagesList"></div>
            <div class="chat-input-modern">
                <input type="text" id="modernChatInput" placeholder="Сообщение...">
                <button id="modernSendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        `;
        panel.appendChild(chatWindowDiv);
        document.getElementById('chatsMainContainer').style.display = 'none';
        document.getElementById('newChatSelection').style.display = 'none';
        
        const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
        messagesUnsubscribe = onSnapshot(q, (snap) => {
            const listDiv = document.getElementById('modernMessagesList');
            if (!listDiv) return;
            listDiv.innerHTML = snap.docs.map(docMsg => {
                const m = docMsg.data();
                const isMe = m.senderId === currentUser.username;
                const time = m.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                return `<div class="msg ${isMe ? 'msg-out' : 'msg-in'}">${escapeHtml(m.text)}<div class="msg-meta">${time} ${isMe ? '<i class="fas fa-check-double"></i>' : ''}</div></div>`;
            }).join('');
            listDiv.scrollTop = listDiv.scrollHeight;
        });
        
        document.getElementById('closeModernChat').onclick = () => {
            if (messagesUnsubscribe) messagesUnsubscribe();
            chatWindowDiv.remove();
            document.getElementById('chatsMainContainer').style.display = 'block';
            renderChatsListModern();
        };
        document.getElementById('modernSendBtn').onclick = async () => {
            const input = document.getElementById('modernChatInput');
            if (input.value.trim()) {
                await sendMessageToChat(chatId, input.value);
                input.value = '';
            }
        };
        document.getElementById('modernChatInput').onkeypress = (e) => { if (e.key === 'Enter') document.getElementById('modernSendBtn').click(); };
    }
    
    async function showNewChatSelection() {
        document.getElementById('chatsMainContainer').style.display = 'none';
        document.getElementById('newChatSelection').style.display = 'block';
        const users = await getAllUsers();
        const filtered = users.filter(u => u.username !== currentUser.username);
        const container = document.getElementById('allUsersList');
        container.innerHTML = filtered.map(u => `
            <div class="user-item" data-username="${u.username}">
                <div class="user-avatar">${escapeHtml(u.username.charAt(0).toUpperCase())}</div>
                <div class="chat-info"><div class="chat-name">${escapeHtml(u.username)}</div></div>
            </div>
        `).join('');
        document.querySelectorAll('.user-item').forEach(el => {
            el.onclick = async () => {
                const target = el.dataset.username;
                const chatId = await getOrCreateChatId(target);
                openModernChat(chatId, target);
            };
        });
        document.getElementById('searchUsersInput').oninput = async (e) => {
            const term = e.target.value.toLowerCase();
            const all = await getAllUsers();
            const filt = all.filter(u => u.username !== currentUser.username && u.username.toLowerCase().includes(term));
            container.innerHTML = filt.map(u => `<div class="user-item" data-username="${u.username}"><div class="user-avatar">${escapeHtml(u.username.charAt(0).toUpperCase())}</div><div class="chat-info"><div class="chat-name">${escapeHtml(u.username)}</div></div></div>`).join('');
            document.querySelectorAll('.user-item').forEach(el => { el.onclick = async () => { const cid = await getOrCreateChatId(el.dataset.username); openModernChat(cid, el.dataset.username); }; });
        };
    }
    
    // ========== НАВИГАЦИЯ И ИНИТ ==========
    function setActivePanel(panel) {
        document.getElementById('feedPanel').classList.add('hide');
        document.getElementById('searchPanel').classList.add('hide');
        document.getElementById('messagesPanel').classList.add('hide');
        document.getElementById('profilePanel').classList.add('hide');
        if (panel === 'home') { document.getElementById('feedPanel').classList.remove('hide'); currentPanel = 'home'; }
        else if (panel === 'search') { document.getElementById('searchPanel').classList.remove('hide'); currentPanel = 'search'; }
        else if (panel === 'messages') {
            document.getElementById('messagesPanel').classList.remove('hide');
            document.getElementById('chatsMainContainer').style.display = 'block';
            document.getElementById('newChatSelection').style.display = 'none';
            const oldChat = document.getElementById('modernChatWindow');
            if (oldChat) oldChat.remove();
            renderChatsListModern();
            currentPanel = 'messages';
        }
        else if (panel === 'profile') { document.getElementById('profilePanel').classList.remove('hide'); updateProfile(); currentPanel = 'profile'; }
        [navHome, navSearch, navMessages, navProfile].forEach(btn => btn.classList.remove('active'));
        if (panel === 'home') navHome.classList.add('active');
        if (panel === 'search') navSearch.classList.add('active');
        if (panel === 'messages') navMessages.classList.add('active');
        if (panel === 'profile') navProfile.classList.add('active');
    }
    
    const navHome = document.getElementById('navHome');
    const navSearch = document.getElementById('navSearch');
    const navMessages = document.getElementById('navMessages');
    const navProfile = document.getElementById('navProfile');
    const createBtn = document.getElementById('navCreatePost');
    const modal = document.getElementById('createModal');
    const postInput = document.getElementById('postTextInput');
    const confirmPost = document.getElementById('confirmPostBtn');
    const cancelModal = document.getElementById('cancelModalBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    
    navHome.onclick = () => setActivePanel('home');
    navSearch.onclick = () => setActivePanel('search');
    navMessages.onclick = () => setActivePanel('messages');
    navProfile.onclick = () => setActivePanel('profile');
    createBtn.onclick = () => { postInput.value = ''; modal.classList.add('active'); };
    confirmPost.onclick = async () => { if (postInput.value.trim()) { await addPost(postInput.value); closeModal(); await loadPosts(); } };
    cancelModal.onclick = () => modal.classList.remove('active');
    modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
    logoutBtn.onclick = () => { if (unsubscribeRealtime) unsubscribeRealtime(); if (chatsUnsubscribe) chatsUnsubscribe(); if (messagesUnsubscribe) messagesUnsubscribe(); document.getElementById('appScreen').style.display = 'none'; document.getElementById('authScreen').style.display = 'block'; currentUser = null; };
    
    document.getElementById('searchInput').addEventListener('input', (e) => performSearch(e.target.value));
    document.getElementById('startNewChatMainBtn').onclick = () => showNewChatSelection();
    document.getElementById('backToChatListBtn').onclick = () => {
        document.getElementById('newChatSelection').style.display = 'none';
        document.getElementById('chatsMainContainer').style.display = 'block';
        renderChatsListModern();
    };
    
    // ========== АВТОРИЗАЦИЯ ==========
    const loginBtn = document.getElementById('loginBtn');
    const showRegisterBtn = document.getElementById('showRegisterBtn');
    const authError = document.getElementById('authError');
    let isLoginMode = true;
    showRegisterBtn.onclick = () => { isLoginMode = !isLoginMode; loginBtn.innerText = isLoginMode ? "Войти" : "Зарегистрироваться"; showRegisterBtn.innerText = isLoginMode ? "Зарегистрироваться" : "Назад к входу"; authError.innerText = ""; };
    async function handleAuth() {
        const username = document.getElementById('loginName').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if (!username || !password) { authError.innerText = "Заполните поля"; return; }
        try {
            if (isLoginMode) { await loginUser(username, password); currentUser = { username }; }
            else { await registerUser(username, password); currentUser = { username }; }
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'flex';
            await loadPosts(); setupRealtime();
            setActivePanel('home');
        } catch (err) { authError.innerText = err.message; }
    }
    loginBtn.onclick = handleAuth;
    document.getElementById('loginPassword').onkeypress = (e) => { if (e.key === 'Enter') handleAuth(); };
    // авто-создание тестового поста
    async function ensurePosts() {
        const q = query(collection(db, "posts"), limit(1));
        const snap = await getDocs(q);
        if (snap.empty) await addDoc(collection(db, "posts"), { author: "OlegTube", text: "Добро пожаловать в OlegTube с современными чатами! 💬", timestamp: new Date(), userId: "system", likes: [], likesCount: 0, authorVerified: true });
    }
    ensurePosts();
</script>
